    <!--@ HELPERS -->
    <script>
        class Helpers {
            constructor() { }

            //* ROUND FUNCTIONS */
            round = (v) => { return Math.round(v * 1) / 1; };
            round1 = (v) => { return Math.round(v * 10) / 10; };
            round2 = (v) => { return Math.round(v * 100) / 100; };

            //* UPDATE TEXT w/ COLOR */
            update_elem_text_colored(id, v, prefix = '$', postfix = 'K') {
                const elem = document.getElementById(id);
                elem.innerHTML = `${prefix}&nbsp;${HELPERS.round2(v).toLocaleString()}&nbsp;${postfix}`;
                elem.style.color = v > 0 ? '#4CAF50' : (v === 0 ? 'grey' : '#e50000');
            }

            //* UPDATE TEXT */
            update_elem_text(id, v, prefix = '$', postfix = 'K') {
                const elem = document.getElementById(id);
                elem.innerHTML = `${prefix}&nbsp;${HELPERS.round2(v).toLocaleString()}&nbsp;${postfix}`;
                // elem.style.color = 'grey';
            }

            //* REPLACE ALL */
            replace_all = (text, str, replace_with) => {
                while (text.indexOf(text) >= 0) {
                    text = text.replace(str, replace_with);
                }
                return text;
            };

            //* REDUCE - SAFE */
            reduce_safe = (array, default_value = 0) => {
                if (array.length === 0) {
                    return default_value;
                } else {
                    return array.reduce((p, c) => p + c);
                }
            };

            //* REMOVE DUPLICATES */
            remove_duplicates = (array) => {
                return array.filter((v, i, a) => a.indexOf(v) === i);
            };
            //* GET HMM */
            getHMM(date) {
                const d = new Date(date);
                let v = d.getHours() * 100;
                v += d.getMinutes();
                return v;
            }

            //* DEEP CLONE */
            deepClone(obj) {
                if (typeof obj !== "object" || obj === null) {
                    return obj;
                }

                const clonedObj = Array.isArray(obj) ? [] : {};

                for (const key in obj) {
                    if (obj.hasOwnProperty(key)) {
                        clonedObj[key] = deepClone(obj[key]);
                    }
                }

                return clonedObj;
            }
        };
    </script>

    <script>
        class Data {
            constructor() { }
            // bars = null;

            //* GET SYMBOLS */
            async get_symbols() {
                const promises = [CONFIG.SYMBOL, 'NQ=F', 'CL=F', '^VIX', /*'AMAT', 'ASML', 'KLAC'*/].map((s) => {
                    return this.get_data(s);
                });
                const obj = await Promise.allSettled(promises);
                return {
                    [CONFIG.SYMBOL]: obj[0].value,
                    'FUTURES': obj[1].value,
                    'OIL': obj[2].value,
                    'VIX': obj[3].value,
                    // 'AMAT': obj[4].value,
                    // 'ASML': obj[5].value,
                    // 'KLAC': obj[6].value,
                };
            }

            //* GET DATA */
            async get_data(name = CONFIG.SYMBOL) {
                return new Promise(async (resolve, reject) => {
                    const dow = new Date().getDay();
                    const hmm = HELPERS.getHMM(new Date);
                    // const start_at = new Date(Date.now() - ((dow === 0 ? 2.5 : (dow === 6 ? 0.75 : 3)) * 24 * 60 * 60 * 1000)).toISOString();
                    // const start_at = new Date(Date.now() - ((hmm > 1200 ? 1.25 : 0.5) * 24 * 60 * 60 * 1000)).toISOString();
                    const start_at = new Date(Date.now() - (CONFIG.COMPARISON_NUM_DAYS() * 24 * 60 * 60 * 1000)).toISOString();
                    const end_at = new Date().toISOString();
                    // const end_at = (new Date(new Date(start_at).getTime() + ( 12 * 60 * 60 * 1000))).toISOString();
                    const url = `${CONFIG.API_URL}/${name}/1Min/${start_at}/${end_at}`;

                    const resp = await fetch(url, {
                        method: 'GET',
                    }).then((resp) => resp.json());
                    resolve(resp.bars[name]);
                });
            };
        }
    </script>

                    CHART_FUTURES.update(data['FUTURES'], 150);
                    CHART_OIL.update(data['OIL'], 150, true);
                    CHART_VIX.update(data['VIX'], 150, true);
                    CHART_ACCOUNT_HISTORY.update(account_history.map((v) => { return { t: v.t, c: v.net } }), 75, true);

                    //* LAST */
                    // const values = CHART.options.series[0].data.map((v)=>v.y);
                    // const current = values[values.length-1];
                    // const previous = values[values.length-2];
                    // const delta = HELPERS.round2(current - previous);
                    // const delta_pct = HELPERS.round2((current - previous) / previous * 100);
                    // HELPERS.update_elem_text_colored('last-gain', HELPERS.round2(delta), '$', '');
                    // HELPERS.update_elem_text_colored('last-pct', HELPERS.round2(delta_pct), '', '%');

                    const account_history_last = account_history_14d[account_history_14d.length-1]
                    if (new Date(account_history_last.t).getDate() !== new Date().getDate()) {
                        account_history_14d.push({e:Date.now(),t: new Date().toLocaleString(), hmm: HELPERS.getHMM(new Date()), net: account_detail.equity})
                    }
                    // _intraday
                    const position_gain = account_positions[0].unrealized_pl;
                    const position_gain_pct = account_positions[0].unrealized_plpc * 100;
                    const spend = HELPERS.round(account_positions[0].cost_basis);

                    const today_gain = account_history_14d[account_history_14d.length - 1].net - account_history_14d[account_history_14d.length - 2].net;
                    const today_gain_pct = (account_history_14d[account_history_14d.length - 1].net - account_history_14d[account_history_14d.length - 2].net) / account_history_14d[account_history_14d.length - 2].net * 100;

                    //* LAST */
                    HELPERS.update_elem_text_colored('last-gain', HELPERS.round2(this.last ? position_gain - this.last : 0), '$', '');
                    HELPERS.update_elem_text_colored('last-pct', HELPERS.round2(this.last_pct ? position_gain_pct - this.last_pct : 0), '', '%');

                    //* TABLE */
                    const seed = 43500; //** TODO: get from account activity **/
                    // HELPERS.update_elem_text_colored('gain', HELPERS.round2(account_detail.equity - seed), '$', '');
                    document.getElementById('symbol-name').innerText = CONFIG.SYMBOL;
                    HELPERS.update_elem_text_colored('positions-gain', HELPERS.round2(position_gain), '$', '');
                    HELPERS.update_elem_text_colored('positions-pct', HELPERS.round2(position_gain_pct), '', '%');
                    HELPERS.update_elem_text_colored('today-gain', HELPERS.round2(today_gain), '$', '');
                    // HELPERS.update_elem_text_colored('today-pct', HELPERS.round2(today_gain_pct), '', '%'); //* TOP FIELD */
                    HELPERS.update_elem_text_colored('today-pct-2', HELPERS.round2(today_gain_pct), '', '%');
                    HELPERS.update_elem_text('invested', spend, '$', '');
                    // HELPERS.update_elem_text('account-equity', HELPERS.round1(account_detail.equity / 1000), '$', 'K');
                    HELPERS.update_elem_text_colored('account-delta', HELPERS.round1(account_detail.equity - seed), '$', '');
                    HELPERS.update_elem_text_colored('account-pct', HELPERS.round2((account_detail.equity / seed * 100) - 100), '', '%');
                    HELPERS.update_elem_text('buying-power', HELPERS.round(account_detail.buying_power), '$', '');

                    //* UPSDAT FIELDS FOR CHANGE CALCULATION */
                    this.last = position_gain;
                    this.last_pct = position_gain_pct;

                    //* STOP LOSS & TRAILING PERCENT CHECKS */
                    const pct = account_positions[0].unrealized_intraday_plpc;
                    if (CONFIG.STOP_LOSS !== 'OFF' && pct < CONFIG.STOP_LOSS) {
                        // ACCOUNT.sell();
                    }
                    this.position_peak_pct = position_gain_pct > +(this.position_peak_pct) ? +(position_gain_pct) : +(this.position_peak_pct);
                    console.log(`%c${HELPERS.round2(INTERVAL.position_peak_pct * (100 + (CONFIG.TRAIL_PCT * INTERVAL.position_peak_pct)))}`, 'color:yellow')
                    // if (CONFIG.TRAIL_PCT !== 'OFF' && pct < INTERVAL.position_peak_pct * (100 + CONFIG.TRAIL_PCT)) {
                    //     ACCOUNT.sell();
                    // }
                }
                document.getElementById('clock').innerText = dt.toLocaleTimeString().split(' ')[0];
            }
        }
    </script>
