        function navigate(value) {
            active_page = value;

            });
            document.getElementById('selected-view').innerHTML = menu_item_map[value];
            window.history.pushState('stateObj', '', `./?${value}`)
        }
        window.addEventListener('popstate', function (event) {
            console.log('popstate', event.target.window.location.search);
        });

    <script>

        setInterval(async () => {
            const d = new Date()
            document.getElementById('clock').innerHTML = d.toLocaleTimeString().split(' ')[0];
            document.getElementById('date').innerHTML = getDMMM(d);

            if ([0, 15, 30, 45].indexOf(d.getSeconds()) >= 0 || now) {
                setTimeout(() => load_data(), round(Math.random() * 1000));
                now = false;
            }
        }, 1000);
    </script>

    <script>
        function key_up(symbol) {
            if (event.key === 'Enter') {
                console.log(symbol);
                click_symbol(symbol.toUpperCase());
                document.getElementById('symbol-input').value = '';
                document.getElementById('bars-analysis-symbol-input').value = '';
            }
        }
        function click_letter(letter) {
            console.log(letter + ' clicked');
            const symbols = stock_symbols_detail.filter((v) => v.symbol.toUpperCase().indexOf(letter.toUpperCase()) === 0);
            // console.log(symbols.map((v) => v.symbol).join(','));

            // let watch_list = 'ADI,ATOM,AVT,BB,BBGI,BLDP,CORZ,ENTG,EVLV,HIMX,HUT,KLAC,KOD,KOPN,KYMR,MARA,MBX,MCHP,MKSI,MPWR,MRNA,MXL,NVMI,ORKA,PENG,PLAB,POET,POWL,ROIV,TIGO,UCTT,VECO,VICR,VRT,WULF'.split(',');
            let watch_list = []; //'AMD,AMZN,AVT,CAT,DHC,DIOD,DRAM,GEV,GOOGL,INTC,KOPN,MCHP,MPWR,MU,ON,PENG,POWL,QCOM,SITM,SNDK,SOXL,STRL,STX,TER,TSEM,VIAV,VRT,VSAT,WDC'.split(',').sort();
            const template = `<div class="w3-button" style="width:100px;border-bottom:{1}px solid {2}" onclick=(click_symbol("{0}"))>{0}</div>`;
            let html = '';
            const names = symbols.map((v) => v.symbol).forEach((v) => {
                html += template
                    .replace('{0}', v)
                    .replace('{0}', v)
                    .replace('{1}', watch_list.indexOf(v) >= 0 ? 7 : 0)
                    .replace('{2}', 'orange');
            });
            document.getElementById('letter-symbols').innerHTML = html;
        }
